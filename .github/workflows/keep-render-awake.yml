name: Keep Render API Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        env:
          RENDER_API_URL: ${{ secrets.RENDER_API_URL }}
        run: |
          if [ -z "$RENDER_API_URL" ]; then
            echo "RENDER_API_URL secret is not set."
            exit 1
          fi

          curl --fail --show-error --location --max-time 30 "$RENDER_API_URL/api/context/current"
